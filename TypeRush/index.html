<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: #16213e;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    h1 {
      margin-bottom: 0.5rem;
      color: #e94560;
      font-size: 2rem;
    }
    #high-score {
      font-size: 0.9rem;
      color: #a0a0b0;
      margin-bottom: 1rem;
    }
    #text-display {
      background: #0f3460;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      font-size: 1.2rem;
      line-height: 1.8;
      text-align: left;
      word-break: break-word;
      min-height: 100px;
      max-height: 200px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    #text-display span {
      transition: color 0.1s, background 0.1s;
    }
    #text-display span.correct {
      color: #4ecca3;
    }
    #text-display span.incorrect {
      color: #e94560;
      background: rgba(233, 69, 96, 0.2);
    }
    #text-display span.current {
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      animation: blink-cursor 0.8s infinite;
    }
    @keyframes blink-cursor {
      0%, 100% { background: rgba(255,255,255,0.2); }
      50% { background: rgba(233, 69, 96, 0.5); }
    }
    #user-input {
      width: 100%;
      height: 120px;
      padding: 1rem;
      font-size: 1.1rem;
      border: 2px solid #533483;
      border-radius: 8px;
      background: #0f3460;
      color: #e0e0e0;
      resize: none;
      outline: none;
      transition: border-color 0.3s;
    }
    #user-input:focus {
      border-color: #e94560;
    }
    #user-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #stats {
      display: flex;
      justify-content: space-around;
      margin: 1.5rem 0;
      font-size: 1.1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    #stats span {
      background: #0f3460;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      min-width: 100px;
    }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s, transform 0.1s;
    }
    button:hover {
      background: #c23152;
      transform: translateY(-2px);
    }
    button:active {
      transform: translateY(0);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: #16213e;
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      min-width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      animation: modal-pop 0.3s ease;
    }
    @keyframes modal-pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal h2 {
      margin-bottom: 1rem;
      color: #e94560;
    }
    .modal p {
      margin: 0.8rem 0;
      font-size: 1.1rem;
    }
    .modal .stat-value {
      font-weight: bold;
      color: #4ecca3;
    }
    .modal button {
      margin-top: 1.5rem;
    }

    @media (max-width: 500px) {
      .container {
        padding: 1.5rem;
      }
      #stats {
        flex-direction: column;
        gap: 1rem;
      }
      #stats span {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Typing Speed Test</h1>
    <div id="high-score">🏆 Personal Best: <span id="best-wpm">0</span> WPM / <span id="best-acc">0</span>% accuracy</div>
    <div id="text-display"></div>
    <textarea id="user-input" placeholder="Start typing here..."></textarea>
    <div id="stats">
      <span>⏱️ <span id="time">0s</span></span>
      <span>🚀 WPM: <span id="wpm">0</span></span>
      <span>🎯 Accuracy: <span id="accuracy">0%</span></span>
    </div>
    <button id="restart-btn">New Test</button>
  </div>

  <div id="result-modal" class="modal-overlay">
    <div class="modal">
      <h2>Test Complete! 🎉</h2>
      <p>⏱️ Time: <span class="stat-value" id="modal-time"></span></p>
      <p>🚀 WPM: <span class="stat-value" id="modal-wpm"></span></p>
      <p>🎯 Accuracy: <span class="stat-value" id="modal-accuracy"></span></p>
      <p>⌨️ Characters typed: <span class="stat-value" id="modal-typed"></span></p>
      <p>❌ Mistakes: <span class="stat-value" id="modal-mistakes"></span></p>
      <button id="modal-restart-btn">Try Again</button>
    </div>
  </div>

  <script>
    const texts = [
      "The quick brown fox jumps over the lazy dog.",
      "Pack my box with five dozen liquor jugs.",
      "How vexingly quick daft zebras jump!",
      "The five boxing wizards jump quickly.",
      "Sphinx of black quartz, judge my vow."
    ];

    let currentText = '';
    let startTime = null;
    let timerInterval = null;
    let testFinished = false;

    const textDisplay = document.getElementById('text-display');
    const userInput = document.getElementById('user-input');
    const restartBtn = document.getElementById('restart-btn');
    const timeEl = document.getElementById('time');
    const wpmEl = document.getElementById('wpm');
    const accuracyEl = document.getElementById('accuracy');
    const bestWpmEl = document.getElementById('best-wpm');
    const bestAccEl = document.getElementById('best-acc');

    const modalOverlay = document.getElementById('result-modal');
    const modalTime = document.getElementById('modal-time');
    const modalWpm = document.getElementById('modal-wpm');
    const modalAccuracy = document.getElementById('modal-accuracy');
    const modalTyped = document.getElementById('modal-typed');
    const modalMistakes = document.getElementById('modal-mistakes');
    const modalRestartBtn = document.getElementById('modal-restart-btn');

    // Load high scores from localStorage
    function loadHighScores() {
      const bestWpm = localStorage.getItem('bestWpm') || 0;
      const bestAcc = localStorage.getItem('bestAcc') || 0;
      bestWpmEl.textContent = bestWpm;
      bestAccEl.textContent = bestAcc;
    }

    function saveHighScore(wpm, acc) {
      const prevWpm = parseInt(localStorage.getItem('bestWpm')) || 0;
      const prevAcc = parseInt(localStorage.getItem('bestAcc')) || 0;
      if (wpm > prevWpm) {
        localStorage.setItem('bestWpm', wpm);
        bestWpmEl.textContent = wpm;
      }
      if (acc > prevAcc) {
        localStorage.setItem('bestAcc', acc);
        bestAccEl.textContent = acc;
      }
    }

    function loadRandomText() {
      if (texts.length === 0) {
        currentText = "No texts available.";
      } else {
        const randomIndex = Math.floor(Math.random() * texts.length);
        currentText = texts[randomIndex];
      }
      textDisplay.innerHTML = currentText.split('').map(ch => `<span>${ch}</span>`).join('');
    }

    function updateHighlights() {
      const inputText = userInput.value;
      const spans = textDisplay.querySelectorAll('span');
      
      spans.forEach(span => {
        span.classList.remove('correct', 'incorrect', 'current');
      });

      for (let i = 0; i < spans.length; i++) {
        if (i < inputText.length) {
          if (inputText[i] === currentText[i]) {
            spans[i].classList.add('correct');
          } else {
            spans[i].classList.add('incorrect');
          }
        }
      }

      // Mark current and auto-scroll
      if (inputText.length < spans.length) {
        const currentSpan = spans[inputText.length];
        currentSpan.classList.add('current');
        // Scroll into view smoothly
        currentSpan.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    function updateStats() {
      const inputText = userInput.value;
      let correct = 0;
      for (let i = 0; i < inputText.length && i < currentText.length; i++) {
        if (inputText[i] === currentText[i]) correct++;
      }
      const totalTyped = inputText.length;
      const accuracy = totalTyped === 0 ? 0 : Math.round((correct / totalTyped) * 100);
      
      let wpm = 0;
      if (startTime) {
        const elapsedMinutes = (Date.now() - startTime) / 60000;
        wpm = Math.round((correct / 5) / elapsedMinutes) || 0;
      }

      timeEl.textContent = startTime ? Math.floor((Date.now() - startTime) / 1000) + 's' : '0s';
      wpmEl.textContent = wpm;
      accuracyEl.textContent = accuracy + '%';
    }

    function finishTest() {
      stopTimer();
      testFinished = true;
      userInput.disabled = true;
      updateHighlights();

      const inputText = userInput.value;
      let correct = 0;
      let mistakes = 0;
      for (let i = 0; i < inputText.length && i < currentText.length; i++) {
        if (inputText[i] === currentText[i]) correct++;
        else mistakes++;
      }
      const totalTyped = inputText.length;
      const finalAccuracy = totalTyped === 0 ? 0 : Math.round((correct / totalTyped) * 100);
      const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
      const finalWpm = parseInt(wpmEl.textContent);

      modalTime.textContent = elapsedSeconds + 's';
      modalWpm.textContent = finalWpm;
      modalAccuracy.textContent = finalAccuracy + '%';
      modalTyped.textContent = totalTyped;
      modalMistakes.textContent = mistakes;

      saveHighScore(finalWpm, finalAccuracy);

      modalOverlay.classList.add('active');
    }

    function handleInput() {
      if (testFinished) return;

      if (!startTime && userInput.value.length > 0) {
        startTime = Date.now();
        timerInterval = setInterval(updateStats, 200);
      }
      updateHighlights();
      updateStats();

      if (userInput.value.length >= currentText.length && currentText.length > 0) {
        finishTest();
      }
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    userInput.addEventListener('input', handleInput);

    function restart() {
      stopTimer();
      testFinished = false;
      userInput.disabled = false;
      modalOverlay.classList.remove('active');
      loadRandomText();
      userInput.value = '';
      startTime = null;
      timeEl.textContent = '0s';
      wpmEl.textContent = '0';
      accuracyEl.textContent = '0%';
      userInput.focus();
      updateHighlights();
    }

    restartBtn.addEventListener('click', restart);
    modalRestartBtn.addEventListener('click', restart);

    // Initialize high scores and first test
    loadHighScores();
    restart();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator | Fast & Easy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💵 Tip Calculator</h1>
    <div class="input-group">
      <label for="bill">Bill amount ($)</label>
      <input type="number" id="bill" placeholder="e.g., 45.50">
    </div>
    <div class="input-group">
      <label>Quick tip %</label>
      <div class="tip-buttons">
        <button class="tip-quick" data-tip="10">10%</button>
        <button class="tip-quick" data-tip="15">15%</button>
        <button class="tip-quick" data-tip="20">20%</button>
      </div>
    </div>
    <div class="input-group">
      <label for="tip">Or custom tip (%)</label>
      <input type="number" id="tip" placeholder="e.g., 15">
    </div>
    <div class="input-group">
      <label for="people">Number of people</label>
      <input type="number" id="people" placeholder="e.g., 2">
    </div>
    <button id="calculateBtn">Calculate Tip</button>
    <button id="resetBtn" class="reset-btn">Reset All</button>
    <div id="result" class="result"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>

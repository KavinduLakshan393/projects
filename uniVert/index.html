<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Google Sans', system-ui, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; 
      justify-content: center; 
      padding: 20px;
    }
    
    .container { 
      max-width: 500px; 
      width: 100%; 
      background: white; 
      padding: 32px; 
      border-radius: 20px; 
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 { 
      text-align: center; 
      margin-bottom: 32px; 
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .categories { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 28px; 
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .cat-btn { 
      flex: 1;
      min-width: 90px;
      padding: 12px 16px; 
      border: none; 
      background: #f0f0f7;
      color: #5f6368;
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    .cat-btn:hover { 
      background: #e8e8f0;
      transform: translateY(-2px);
    }
    
    .cat-btn.active { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .converter { 
      margin-bottom: 28px; 
    }
    
    .unit-row { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      margin-bottom: 16px; 
      position: relative; 
    }
    
    .unit-row input, .unit-row .dropdown { 
      flex: 1; 
    }
    
    .swap-btn { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
      border: none; 
      padding: 12px 16px; 
      border-radius: 12px; 
      cursor: pointer; 
      font-size: 1.2rem;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
    }
    
    .swap-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 28px rgba(102, 126, 234, 0.5);
    }

    .input-group { 
      position: relative; 
    }
    
    .input-group input { 
      width: 100%; 
      padding: 14px 16px; 
      border: 2px solid #e8e8f0;
      border-radius: 12px; 
      font-size: 1rem;
      font-family: 'Google Sans', system-ui, sans-serif;
      transition: all 0.3s ease;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    #inputValue { 
      width: 100%; 
      padding: 14px 16px; 
      border: 2px solid #e8e8f0;
      border-radius: 12px; 
      font-size: 1rem;
      font-family: 'Google Sans', system-ui, sans-serif;
      transition: all 0.3s ease;
    }
    
    #inputValue:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .dropdown { 
      position: relative; 
    }
    
    .dropdown .selected { 
      padding: 14px 16px; 
      border: 2px solid #e8e8f0;
      border-radius: 12px; 
      background: white; 
      cursor: pointer; 
      display: flex; 
      justify-content: space-between;
      font-family: 'Google Sans', system-ui, sans-serif;
      font-weight: 500;
      color: #202124;
      transition: all 0.3s ease;
    }
    
    .dropdown .selected:hover {
      border-color: #667eea;
    }
    
    .dropdown.open .selected {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .dropdown .search-input { 
      width: 100%; 
      padding: 12px 16px; 
      border: none; 
      border-bottom: 1px solid #e8e8f0;
      font-family: 'Google Sans', system-ui, sans-serif;
    }
    
    .dropdown .search-input:focus {
      outline: none;
    }
    
    .dropdown .options { 
      position: absolute; 
      top: 100%; 
      left: 0; 
      right: 0; 
      background: white; 
      border: 1px solid #e8e8f0;
      border-top: none;
      border-radius: 0 0 12px 12px; 
      max-height: 240px; 
      overflow-y: auto; 
      z-index: 10; 
      display: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }
    
    .dropdown.open .options { 
      display: block; 
    }
    
    .option { 
      padding: 12px 16px; 
      cursor: pointer;
      font-family: 'Google Sans', system-ui, sans-serif;
      color: #202124;
      transition: all 0.2s ease;
    }
    
    .option:hover, .option.highlighted { 
      background: #f8f9ff;
      color: #667eea;
      padding-left: 20px;
    }

    .result { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      margin-top: 20px; 
      background: linear-gradient(135deg, #f8f9ff 0%, #f0f0f7 100%);
      padding: 18px; 
      border-radius: 12px;
      border: 1px solid #e8e8f0;
    }
    
    .result-value { 
      font-size: 1.6rem; 
      font-weight: 700; 
      flex: 1; 
      word-break: break-all;
      color: #667eea;
    }
    
    .copy-btn, .fav-btn { 
      background: white;
      border: 2px solid #e8e8f0;
      padding: 10px 14px; 
      border-radius: 10px; 
      cursor: pointer; 
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }
    
    .copy-btn:hover, .fav-btn:hover { 
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
    }

    .favorites { 
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid #e8e8f0;
    }
    
    .favorites h2 { 
      margin-bottom: 16px; 
      font-size: 1.1rem;
      font-weight: 600;
      color: #202124;
    }
    
    .fav-list { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 10px; 
    }
    
    .fav-item { 
      background: linear-gradient(135deg, #e8eef7 0%, #f0e8f7 100%);
      padding: 8px 16px; 
      border-radius: 20px; 
      cursor: pointer; 
      font-size: 0.9rem;
      display: flex; 
      align-items: center; 
      gap: 8px;
      border: 1px solid #d8d8e8;
      transition: all 0.3s ease;
      font-weight: 500;
      color: #667eea;
    }
    
    .fav-item .remove-fav { 
      color: #999; 
      font-weight: bold; 
      margin-left: 4px;
      cursor: pointer;
    }
    
    .fav-item:hover { 
      background: linear-gradient(135deg, #d8d8f0 0%, #e8d8f0 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }

    @media (max-width: 400px) { 
      .container { 
        padding: 20px; 
      } 
      h1 {
        font-size: 1.6rem;
        margin-bottom: 24px;
      }
      .swap-btn { 
        padding: 10px 12px; 
      }
      .cat-btn {
        min-width: 80px;
        font-size: 0.9rem;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Unit Converter</h1>
    
    <div class="categories" id="categories"></div>

    <div class="converter">
      <div class="unit-row">
        <input type="number" id="inputValue" placeholder="Enter value" step="any" />
        <div class="dropdown" id="fromUnitDropdown">
          <div class="selected"><span class="label">meter</span> ▾</div>
          <div class="options">
            <input type="text" class="search-input" placeholder="Search..." />
            <div class="options-list"></div>
          </div>
        </div>
      </div>

      <div class="unit-row" style="justify-content: center;">
        <button class="swap-btn" id="swapBtn" title="Swap units">⇅</button>
        <button class="fav-btn" id="favBtn" title="Save to favorites">⭐</button>
      </div>

      <div class="unit-row">
        <div class="dropdown" id="toUnitDropdown">
          <div class="selected"><span class="label">kilometer</span> ▾</div>
          <div class="options">
            <input type="text" class="search-input" placeholder="Search..." />
            <div class="options-list"></div>
          </div>
        </div>
      </div>

      <div class="result">
        <span class="result-value" id="resultDisplay">—</span>
        <button class="copy-btn" id="copyBtn" title="Copy result">📋</button>
      </div>
    </div>

    <div class="favorites" id="favoritesSection" style="display: none;">
      <h2>⭐ Favorites</h2>
      <div class="fav-list" id="favList"></div>
    </div>
  </div>

  <script>
    // Unit definitions (currency rates will be fetched, fallback used here)
    const unitCategories = {
      length: {
        meter: 1,
        kilometer: 1000,
        mile: 1609.344,
        yard: 0.9144,
        foot: 0.3048,
        inch: 0.0254,
        centimeter: 0.01,
        millimeter: 0.001
      },
      weight: {
        kilogram: 1,
        gram: 0.001,
        milligram: 0.000001,
        ton: 1000,
        pound: 0.453592,
        ounce: 0.0283495
      },
      volume: {
        liter: 1,
        milliliter: 0.001,
        gallon: 3.78541,
        quart: 0.946353,
        pint: 0.473176,
        cup: 0.236588,
        fluidOunce: 0.0295735
      },
      temperature: {}
    };

    let currentCategory = 'length';
    let fromUnit = 'meter';
    let toUnit = 'kilometer';
    let currencyRates = null;

    // Favorites stored as {from, to, category}
    let favorites = JSON.parse(localStorage.getItem('favConversions') || '[]');

    const catContainer = document.getElementById('categories');
    const inputValue = document.getElementById('inputValue');
    const fromDropdown = document.getElementById('fromUnitDropdown');
    const toDropdown = document.getElementById('toUnitDropdown');
    const swapBtn = document.getElementById('swapBtn');
    const favBtn = document.getElementById('favBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const copyBtn = document.getElementById('copyBtn');
    const favSection = document.getElementById('favoritesSection');
    const favList = document.getElementById('favList');

    function renderCategories() {
      catContainer.innerHTML = '';
      // Add static categories + currency
      const allCats = Object.keys(unitCategories).concat('currency');
      allCats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.addEventListener('click', () => switchCategory(cat));
        catContainer.appendChild(btn);
      });
    }

    function convert(value, from, to, category) {
      if (value === '' || isNaN(value)) return null;
      const num = parseFloat(value);
      if (category === 'temperature') {
        if (from === to) return num;
        let celsius;
        if (from === 'celsius') celsius = num;
        else if (from === 'fahrenheit') celsius = (num - 32) * 5 / 9;
        else if (from === 'kelvin') celsius = num - 273.15;
        if (to === 'celsius') return celsius;
        else if (to === 'fahrenheit') return celsius * 9 / 5 + 32;
        else if (to === 'kelvin') return celsius + 273.15;
      } else if (category === 'currency') {
        if (!currencyRates) return null;
        const fromRate = currencyRates[from];
        const toRate = currencyRates[to];
        if (!fromRate || !toRate) return null;
        return num * (toRate / fromRate);
      } else {
        const factors = unitCategories[category];
        const fromFactor = factors[from];
        const toFactor = factors[to];
        if (fromFactor === undefined || toFactor === undefined) return null;
        return num * (fromFactor / toFactor);
      }
    }

    function performConversion() {
      const value = inputValue.value;
      const result = convert(value, fromUnit, toUnit, currentCategory);
      resultDisplay.textContent = result !== null ? `${result} ${toUnit}` : '—';
    }

    function getUnitList(category) {
      if (category === 'temperature') return ['celsius', 'fahrenheit', 'kelvin'];
      if (category === 'currency' && currencyRates) return Object.keys(currencyRates).sort();
      return Object.keys(unitCategories[category] || {});
    }

    // Dropdown setup with search & keyboard nav
    function setupDropdown(dropdownEl, initialUnit, onSelect) {
      const selectedDiv = dropdownEl.querySelector('.selected');
      const optionsDiv = dropdownEl.querySelector('.options');
      const searchInput = optionsDiv.querySelector('.search-input');
      const optionsList = optionsDiv.querySelector('.options-list');
      let isOpen = false;
      let highlightedIndex = -1;

      function open() {
        isOpen = true;
        dropdownEl.classList.add('open');
        searchInput.value = '';
        filterOptions('');
        searchInput.focus();
        highlightedIndex = -1;
      }
      function close() {
        isOpen = false;
        dropdownEl.classList.remove('open');
      }
      function setUnit(unit) {
        selectedDiv.querySelector('.label').textContent = unit;
        onSelect(unit);
        close();
        performConversion();
      }
      function filterOptions(query) {
        const units = getUnitList(currentCategory);
        const filtered = units.filter(u => u.toLowerCase().includes(query.toLowerCase()));
        optionsList.innerHTML = '';
        if (filtered.length === 0) {
          optionsList.innerHTML = '<div class="option" style="color:gray">No match</div>';
        } else {
          filtered.forEach((unit) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.textContent = unit;
            div.dataset.unit = unit;
            div.addEventListener('click', () => setUnit(unit));
            optionsList.appendChild(div);
          });
        }
      }
      function updateHighlight(opts) {
        opts.forEach((opt, i) => {
          opt.classList.toggle('highlighted', i === highlightedIndex);
        });
      }

      selectedDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        isOpen ? close() : open();
      });
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowDown') {
          e.preventDefault();
          const opts = optionsList.querySelectorAll('.option:not([style*="gray"])');
          if (opts.length) {
            highlightedIndex = Math.min(highlightedIndex + 1, opts.length - 1);
            updateHighlight(opts);
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const opts = optionsList.querySelectorAll('.option:not([style*="gray"])');
          if (opts.length) {
            highlightedIndex = Math.max(highlightedIndex - 1, 0);
            updateHighlight(opts);
          }
        } else if (e.key === 'Enter') {
          e.preventDefault();
          const opts = optionsList.querySelectorAll('.option:not([style*="gray"])');
          if (highlightedIndex >= 0 && highlightedIndex < opts.length) {
            setUnit(opts[highlightedIndex].dataset.unit);
          } else if (opts.length > 0) {
            setUnit(opts[0].dataset.unit);
          }
        }
      });
      searchInput.addEventListener('input', () => {
        filterOptions(searchInput.value);
        highlightedIndex = -1;
      });
      document.addEventListener('click', (e) => {
        if (!dropdownEl.contains(e.target)) close();
      });

      selectedDiv.querySelector('.label').textContent = initialUnit;
    }

    // Favorites functions
    function saveFavorites() {
      localStorage.setItem('favConversions', JSON.stringify(favorites));
    }
    function addFavorite() {
      const entry = { from: fromUnit, to: toUnit, category: currentCategory };
      const exists = favorites.some(f => f.from === entry.from && f.to === entry.to && f.category === entry.category);
      if (!exists) {
        favorites.push(entry);
        saveFavorites();
        renderFavorites();
      }
    }
    function removeFavorite(index) {
      favorites.splice(index, 1);
      saveFavorites();
      renderFavorites();
    }
    function renderFavorites() {
      favSection.style.display = favorites.length ? 'block' : 'none';
      favList.innerHTML = '';
      favorites.forEach((fav, idx) => {
        const item = document.createElement('span');
        item.className = 'fav-item';
        item.innerHTML = `${fav.category}: ${fav.from} → ${fav.to} <span class="remove-fav" data-idx="${idx}">✕</span>`;
        item.addEventListener('click', (e) => {
          if (e.target.classList.contains('remove-fav')) {
            e.stopPropagation();
            removeFavorite(idx);
          } else {
            switchCategory(fav.category);
            // Update dropdown labels
            fromDropdown.querySelector('.selected .label').textContent = fav.from;
            toDropdown.querySelector('.selected .label').textContent = fav.to;
            fromUnit = fav.from;
            toUnit = fav.to;
            performConversion();
          }
        });
        favList.appendChild(item);
      });
    }

    // Currency fetch with caching
    async function fetchCurrencyRates() {
      const cacheKey = 'currencyRatesCache';
      const cacheExpiry = 60 * 60 * 1000; // 1 hour
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const { rates, timestamp } = JSON.parse(cached);
        if (Date.now() - timestamp < cacheExpiry) {
          currencyRates = rates;
          return;
        }
      }
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        if (data.result === 'success') {
          currencyRates = data.rates;
          localStorage.setItem(cacheKey, JSON.stringify({ rates: currencyRates, timestamp: Date.now() }));
        } else {
          throw new Error('Invalid API response');
        }
      } catch (err) {
        console.warn('Could not fetch currency rates, using fallback');
        currencyRates = {
          USD: 1, EUR: 0.92, GBP: 0.79, JPY: 149.5, CAD: 1.36,
          AUD: 1.52, CHF: 0.88, CNY: 7.24, INR: 83.1, MXN: 16.7
        };
      }
    }

    async function switchCategory(cat) {
      currentCategory = cat;
      renderCategories();
      if (cat === 'currency' && !currencyRates) {
        await fetchCurrencyRates();
      }
      const units = getUnitList(cat);
      if (units.length > 0) {
        fromUnit = units[0];
        toUnit = units[1] || units[0];
      } else {
        // Fallback if rates not loaded yet
        fromUnit = 'USD';
        toUnit = 'EUR';
      }
      fromDropdown.querySelector('.selected .label').textContent = fromUnit;
      toDropdown.querySelector('.selected .label').textContent = toUnit;
      fromDropdown.classList.remove('open');
      toDropdown.classList.remove('open');
      performConversion();
    }

    // Event listeners
    inputValue.addEventListener('input', performConversion);
    swapBtn.addEventListener('click', () => {
      [fromUnit, toUnit] = [toUnit, fromUnit];
      fromDropdown.querySelector('.selected .label').textContent = fromUnit;
      toDropdown.querySelector('.selected .label').textContent = toUnit;
      performConversion();
    });
    favBtn.addEventListener('click', addFavorite);
    copyBtn.addEventListener('click', () => {
      const text = resultDisplay.textContent;
      if (text !== '—') {
        navigator.clipboard.writeText(text).then(() => alert('Copied!'));
      }
    });

    // Initial setup
    renderCategories();
    setupDropdown(fromDropdown, 'meter', (unit) => { fromUnit = unit; });
    setupDropdown(toDropdown, 'kilometer', (unit) => { toUnit = unit; });
    renderFavorites();

        if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.log('SW registration failed', err));
    }
  </script>
</body>
</html>

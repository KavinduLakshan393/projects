<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
    .container { max-width: 500px; width: 100%; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    h1 { text-align: center; margin-bottom: 20px; font-size: 1.8rem; }

    .categories { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .cat-btn { flex: 1; padding: 10px; border: none; background: #e0e0e0; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .cat-btn.active { background: #4f46e5; color: white; }

    .converter { margin-bottom: 24px; }
    .unit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; position: relative; }
    .unit-row input, .unit-row .dropdown { flex: 1; }
    .swap-btn { background: #4f46e5; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }

    .input-group { position: relative; }
    .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
    .dropdown { position: relative; }
    .dropdown .selected { padding: 12px; border: 1px solid #ccc; border-radius: 8px; background: white; cursor: pointer; display: flex; justify-content: space-between; }
    .dropdown .search-input { width: 100%; padding: 10px; border: none; border-bottom: 1px solid #ccc; }
    .dropdown .options { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; }
    .dropdown.open .options { display: block; }
    .option { padding: 10px; cursor: pointer; }
    .option:hover, .option.highlighted { background: #f0f0ff; }

    .result { display: flex; align-items: center; gap: 12px; margin-top: 12px; background: #f9fafb; padding: 12px; border-radius: 8px; }
    .result-value { font-size: 1.5rem; font-weight: bold; flex: 1; word-break: break-all; }
    .copy-btn, .fav-btn { background: none; border: 1px solid #ccc; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; }
    .copy-btn:hover, .fav-btn:hover { background: #e0e0e0; }

    .favorites h2 { margin-bottom: 12px; font-size: 1.2rem; }
    .fav-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .fav-item { background: #e8e8ff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .fav-item .remove-fav { color: #888; font-weight: bold; margin-left: 4px; }
    .fav-item:hover { background: #d0d0ff; }

    @media (max-width: 400px) { .container { padding: 16px; } .swap-btn { padding: 8px 12px; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Unit Converter</h1>
    
    <div class="categories" id="categories"></div>

    <div class="converter">
      <div class="unit-row">
        <input type="number" id="inputValue" placeholder="Enter value" step="any" />
        <div class="dropdown" id="fromUnitDropdown">
          <div class="selected"><span class="label">meter</span> ▾</div>
          <div class="options">
            <div class="options-list"></div>
          </div>
        </div>
      </div>

      <div class="unit-row" style="justify-content: center;">
        <button class="swap-btn" id="swapBtn" title="Swap units">⇅</button>
        <button class="fav-btn" id="favBtn" title="Save to favorites">⭐</button>
      </div>

      <div class="unit-row">
        <div class="dropdown" id="toUnitDropdown">
          <div class="selected"><span class="label">kilometer</span> ▾</div>
          <div class="options">
            <div class="options-list"></div>
          </div>
        </div>
      </div>

      <div class="result">
        <span class="result-value" id="resultDisplay">—</span>
        <button class="copy-btn" id="copyBtn" title="Copy result">📋</button>
      </div>
    </div>

    <div class="favorites" id="favoritesSection" style="display: none;">
      <h2>⭐ Favorites</h2>
      <div class="fav-list" id="favList"></div>
    </div>
  </div>

  <script>
    // Unit definitions
    const unitCategories = {
      length: {
        meter: 1,
        kilometer: 1000,
        mile: 1609.344,
        yard: 0.9144,
        foot: 0.3048,
        inch: 0.0254,
        centimeter: 0.01,
        millimeter: 0.001
      },
      weight: {
        kilogram: 1,
        gram: 0.001,
        milligram: 0.000001,
        ton: 1000,
        pound: 0.453592,
        ounce: 0.0283495
      },
      volume: {
        liter: 1,
        milliliter: 0.001,
        gallon: 3.78541,
        quart: 0.946353,
        pint: 0.473176,
        cup: 0.236588,
        fluidOunce: 0.0295735
      },
      temperature: {},
      currency: {
        USD: 1,
        EUR: 0.92,
        GBP: 0.79,
        JPY: 149.5,
        CAD: 1.36,
        AUD: 1.52,
        CHF: 0.88,
        CNY: 7.24,
        INR: 83.1,
        MXN: 16.7
      }
    };

    let currentCategory = 'length';
    let fromUnit = 'meter';
    let toUnit = 'kilometer';

    const catContainer = document.getElementById('categories');
    const inputValue = document.getElementById('inputValue');
    const fromDropdown = document.getElementById('fromUnitDropdown');
    const toDropdown = document.getElementById('toUnitDropdown');
    const swapBtn = document.getElementById('swapBtn');
    const resultDisplay = document.getElementById('resultDisplay');

    function renderCategories() {
      catContainer.innerHTML = '';
      Object.keys(unitCategories).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${cat === currentCategory ? 'active' : ''}`;
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        btn.addEventListener('click', () => switchCategory(cat));
        catContainer.appendChild(btn);
      });
    }

    function convert(value, from, to, category) {
      if (value === '' || isNaN(value)) return null;
      const num = parseFloat(value);
      if (category === 'temperature') {
        if (from === to) return num;
        let celsius;
        if (from === 'celsius') celsius = num;
        else if (from === 'fahrenheit') celsius = (num - 32) * 5 / 9;
        else if (from === 'kelvin') celsius = num - 273.15;
        if (to === 'celsius') return celsius;
        else if (to === 'fahrenheit') return celsius * 9 / 5 + 32;
        else if (to === 'kelvin') return celsius + 273.15;
      } else {
        const factors = unitCategories[category];
        const fromFactor = factors[from];
        const toFactor = factors[to];
        if (fromFactor === undefined || toFactor === undefined) return null;
        return num * (fromFactor / toFactor);
      }
    }

    function performConversion() {
      const value = inputValue.value;
      const result = convert(value, fromUnit, toUnit, currentCategory);
      resultDisplay.textContent = result !== null ? `${result} ${toUnit}` : '—';
    }

    function getUnitList(category) {
      if (category === 'temperature') return ['celsius', 'fahrenheit', 'kelvin'];
      return Object.keys(unitCategories[category]);
    }

    function setupDropdown(dropdownEl, initialUnit, onSelect) {
      const selectedDiv = dropdownEl.querySelector('.selected');
      const optionsList = dropdownEl.querySelector('.options-list');
      let isOpen = false;

      function open() {
        isOpen = true;
        dropdownEl.classList.add('open');
      }
      function close() {
        isOpen = false;
        dropdownEl.classList.remove('open');
      }
      function setUnit(unit) {
        selectedDiv.querySelector('.label').textContent = unit;
        onSelect(unit);
        close();
        performConversion();
      }
      function renderOptions() {
        const units = getUnitList(currentCategory);
        optionsList.innerHTML = '';
        units.forEach(unit => {
          const div = document.createElement('div');
          div.className = 'option';
          div.textContent = unit;
          div.addEventListener('click', () => setUnit(unit));
          optionsList.appendChild(div);
        });
      }

      selectedDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isOpen) {
          close();
        } else {
          renderOptions();
          open();
        }
      });
      document.addEventListener('click', (e) => {
        if (!dropdownEl.contains(e.target)) close();
      });

      // Initialize label
      selectedDiv.querySelector('.label').textContent = initialUnit;
    }

    function switchCategory(cat) {
      currentCategory = cat;
      renderCategories();
      const units = getUnitList(cat);
      fromUnit = units[0];
      toUnit = units[1] || units[0];
      fromDropdown.querySelector('.selected .label').textContent = fromUnit;
      toDropdown.querySelector('.selected .label').textContent = toUnit;
      performConversion();
    }

    swapBtn.addEventListener('click', () => {
      [fromUnit, toUnit] = [toUnit, fromUnit];
      fromDropdown.querySelector('.selected .label').textContent = fromUnit;
      toDropdown.querySelector('.selected .label').textContent = toUnit;
      performConversion();
    });

    inputValue.addEventListener('input', performConversion);

    // Initial setup
    renderCategories();
    setupDropdown(fromDropdown, 'meter', (unit) => { fromUnit = unit; });
    setupDropdown(toDropdown, 'kilometer', (unit) => { toUnit = unit; });
  </script>
</body>
</html>

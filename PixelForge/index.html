<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge // Retro Sprite Dev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">PIXELFORGE <span class="version">v1.0.0</span></div>
        <div class="global-controls">
            <button id="btn-grid-8" class="btn active-mode">8x8 Grid</button>
            <button id="btn-grid-16" class="btn">16x16 Grid</button>
            <button id="btn-clear" class="btn btn-danger">Clear Canvas</button>
        </div>
    </header>

    <main class="editor-container">
        <aside class="sidebar sidebar-left">
            <div class="panel-title">TOOLKIT</div>
            <div class="tools-wrapper">
                <button id="tool-draw" class="tool-btn active-tool">Pencil</button>
                <button id="tool-erase" class="tool-btn">Eraser</button>
            </div>

            <div class="panel-title">PALETTE presets</div>
            <div class="palette-grid" id="palette">
                </div>
            <div class="custom-color-picker">
                <label for="color-input">Custom Color:</label>
                <input type="color" id="color-input" value="#1a1a1a">
            </div>

            <div class="panel-title">FRAME MANAGER</div>
            <div class="frame-controls">
                <button id="btn-add-frame" class="btn btn-success" style="width: 100%; margin-bottom: 8px;">+ Add New Frame</button>
                <button id="btn-clone-frame" class="btn" style="width: 100%; margin-bottom: 8px;">⚡ Copy Current Frame</button>
                <div class="frame-list-label">Active Frames:</div>
                <div id="frame-strip" class="frame-strip-container">
                    </div>
            </div>
        </aside>

        <section class="workspace">
            <div id="pixel-grid" class="grid-layout"></div>
        </section>

        <aside class="sidebar sidebar-right">
            <div class="panel-title">ANIMATION PREVIEW</div>
            <div class="preview-box">
                <div id="animation-render"></div>
            </div>
            <div class="fps-control">
                <label for="fps-slider">FPS: <span id="fps-val">8</span></label>
                <input type="range" id="fps-slider" min="1" max="24" value="8">
            </div>

            <div class="panel-title">MATRIX EXPORT</div>
            <div class="export-wrapper">
                <textarea id="code-output" readonly placeholder="// Complete 2D array output will render here..."></textarea>
                <button id="btn-copy" class="btn btn-success">Copy Array</button>
            </div>
        </aside>
    </main>

    <footer class="app-footer">
        <div class="status-bar">STATUS: Ready // Workspace: 8x8 Matrix</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prescription Interaction Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Prescription Interaction Checker</h1>
    <p>Enter your medicines below, then check for interactions and see what they're used for.</p>

    <div id="medicine-rows">
      <!-- Rows will be generated by JavaScript -->
    </div>

    <div class="actions">
      <button type="button" id="add-row">+ Add medicine</button>
      <div class="duration">
        <label for="duration">Total duration:</label>
        <input type="text" id="duration" placeholder="e.g., 10 days">
      </div>
      <button type="button" id="check-interactions">Check Interactions</button>
    </div>

    <div id="results" class="hidden">
      <!-- Results appear here -->
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Theme Toggle Button -->
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <span class="toggle-icon">🌙</span>
        </button>

        <!-- Profile Section -->
        <div class="profile">
            <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-pic">
            <h1 class="profile-name">Your Name</h1>
            <p class="bio">Full Stack Developer | Creative Problem Solver | Tech Enthusiast</p>
        </div>

        <!-- Social Links Container -->
        <div class="links-container">
            <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="link-button">
                GitHub
            </a>
            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="link-button">
                LinkedIn
            </a>
            <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="link-button">
                Twitter
            </a>
            <a href="mailto:your.email@example.com" class="link-button">
                Email
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
